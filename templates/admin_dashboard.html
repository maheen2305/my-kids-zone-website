{% extends "base.html" %}

{% block content %}

<div class="admin-dashboard">
    <h2>Admission Enquiries</h2>

    <a href="/admin/logout" class="logout-btn">Logout</a>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Age</th>
                    <th>Parent</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Program</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for e in enquiries %}
                <tr>
                    <td>{{ e[0] }}</td>
                    <td>{{ e[1] }}</td>
                    <td>{{ e[3] }}</td>
                    <td>{{ e[4] }}</td>
                    <td>{{ e[5] }}</td>
                    <td>{{ e[6] }}</td>
                    <td>{{ e[8] }}</td>
                    <td>
                        <a href="/admin/delete/{{ e[0] }}" class="delete-btn">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

{% endblock %}
